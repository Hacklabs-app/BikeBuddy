name: bike_buddy
description: A bike hiring app with admin and customer features.
publish_to: 'none'
version: 1.3.1+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.6
  go_router: ^14.2.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/

