name: bike_buddy
description: A bike hiring app with admin and customer features.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.6
  go_router: ^14.2.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  google_maps_flutter: ^2.6.1
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  pdf: ^3.11.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
